; ShaderOverride Plugin - In-Memory Configuration
; ================================================
; Specify which engine shader files (.usf) should be overridden with
; custom versions loaded into memory.
;
; The plugin will intercept file reads for these shaders and serve
; the custom versions from memory - no disk modification required!
;
; Format: One shader filename per line

[ShaderOverride]
; List of shader files to override in-memory
; Each shader must exist in the Plugin/Shaders/ directory

;+Shaders=PostProcessToneMap.usf
+Shaders=PostProcessCombineLUTs.usf

; Additional shaders you can override (uncomment as needed):
; +Shaders=BasePassPixelShader.usf
; +Shaders=BasePassVertexShader.usf
; +Shaders=DeferredShadingRenderer.usf
; +Shaders=PostProcessMaterial.usf
; +Shaders=AtmosphericFog.usf
; +Shaders=DepthOfField.usf
; +Shaders=Bloom.usf
; +Shaders=MotionBlur.usf
; +Shaders=SSAO.usf
; +Shaders=SSR.usf

[Options]
; Enable verbose logging for debugging
VerboseLogging=false

; Log every shader file access
LogShaderAccess=false
